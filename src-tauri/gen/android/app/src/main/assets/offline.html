<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotiLIE - Offline</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        p {
            color: #b3b3b3;
            margin-bottom: 32px;
        }
        button {
            background-color: #1db954;
            color: black;
            border: none;
            padding: 12px 32px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="icon">📶</div>
    <h1>Connection Unavailable</h1>
    <p>SpotiLIE couldn't reach Spotify.<br>Check your internet connection.</p>
    <button onclick="retry()">Try Again</button>

    <script>
        function retry() {
            window.location.href = "https://open.spotify.com";
        }
    </script>
</body>
</html>
